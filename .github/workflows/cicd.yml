name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-addlicense-v1.2.0

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@v1.2.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - run: make cicd_build

      #- name: Coverage summary
      #  run: |
      #    echo '```' >> $GITHUB_STEP_SUMMARY
      #    grep -E '^\[.*\]:.*lines\.\.\.\.\.\.' coverage.log >> $GITHUB_STEP_SUMMARY
      #    echo '```' >> $GITHUB_STEP_SUMMARY

      #- name: Benchmarks summary
      #  run: cat benchmarks.log >> $GITHUB_STEP_SUMMARY

  test-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: browser-actions/setup-chrome@v2

      - name: Run web compression tests in Chrome
        run: make web_test
        env:
          CHROME_EXECUTABLE: chrome

