name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded in-progress runs on the same PR branch, but let main-branch
# runs complete so benchmark and coverage history is never gapped.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Linux: quality gate, Dart tests, coverage, benchmarks, doc site ─────────
  #
  # This is the primary gate.  All other jobs depend on it.
  # Runs: format_check → analyze → license_check → test_dart → coverage (≥90%)
  #       → benchmarks → doc site HTML
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov libicu-dev

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - run: make cicd_linux

      - name: Coverage summary
        if: always()
        run: |
          if [ -f site/coverage/lcov.info ]; then
            {
              echo '## Coverage'
              echo '```'
              lcov --summary site/coverage/lcov.info 2>&1 || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - run: make doc_site_html

      - name: Benchmarks summary
        if: always()
        run: |
          if [ -f benchmarks.log ]; then
            {
              echo '## Benchmarks'
              echo '```'
              cat benchmarks.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./site"

  # ── macOS: Dart tests on macOS file system + arm64/x86_64 native assets ──────
  #
  # Verifies betto_zstd dylib builds and loads on macOS, and that test
  # behaviour is consistent with Linux.  Skips format/analyze/license (Linux).
  test-macos:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: make cicd_macos

  # ── Windows: Dart tests on Windows file system + native DLL ─────────────────
  #
  # Verifies betto_zstd DLL builds and loads on Windows, and that path/file
  # handling is consistent with Linux.  Runs in Git Bash (shell: bash).
  test-windows:
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: make cicd_windows
        shell: bash

  # ── iCloud Flutter plugin: format, analyze, unit tests ──────────────────────
  #
  # Bootstraps kmdb_icloud and its example app with the Flutter SDK, then runs
  # format check, flutter analyze, and flutter test (harness convergence tests).
  # e2e tests are credential-gated and skip automatically.
  test-icloud:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('packages/kmdb_icloud/pubspec.lock', 'packages/kmdb_icloud/example/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - run: make cicd_icloud

  # ── Web: WASM compression codec tests in Chrome ──────────────────────────────
  #
  # Verifies that betto_zstd's WASM path compresses and decompresses correctly
  # in a browser environment.
  test-web:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: browser-actions/setup-chrome@v2

      - run: make cicd_web
        env:
          CHROME_EXECUTABLE: chrome

  # ── GitHub Pages deployment ────────────────────────────────────────────────
  #
  # Uncomment when the GitHub repo is public and Pages is enabled in repo
  # Settings → Pages → Source: GitHub Actions.

