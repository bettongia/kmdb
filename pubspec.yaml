name: kmdb_workspace
publish_to: none

environment:
  sdk: ^3.10.8

workspace:
  - packages/kmdb
  - packages/kmdb_cli
  - packages/kmdb_zstd
  - packages/kmdb_ui
  - packages/kmdb_tokenizer_icu
  - packages/kmdb_inferencing
  - packages/kmdb_lexical
  - packages/kmdb_schema
  - packages/kmdb_mimeinfo

dev_dependencies:
  lints: ^6.0.0
  melos: ^7.5.0
  test: ^1.25.6
  pubspec_checker: ^1.3.0

dependency_overrides:
  # Override meta to resolve conflict between aurochs_registry_freedesktop_mimeinfo
  # (requires ^1.18.2) and flutter_test from sdk (pins 1.17.0). This override
  # allows the non-Flutter packages to build while keeping Flutter UI tests working.
  meta: ^1.18.2
  betto_builder_tools:
    path: ../builder_tools

melos:
  scripts:
    analyze:
      description: Analyze all packages
      exec: dart analyze

    format:
      description: Format dart code
      exec: dart format lib test

    benchmarks:
      description: Run all benchmarks
      exec: dart run benchmark/main.dart
      packageFilters:
        dirExists: benchmark
        flutter: false

    test:
      description: Test all packages
      exec: dart test
      packageFilters:
        dirExists: test
        flutter: false

    flutter-test:
      description: Test all packages that use Flutter SDK
      exec: flutter test
      packageFilters:
        dirExists: test
        flutter: true

    e2e-test:
      description: Run the e2e tests
      exec: dart test --preset e2e
      packageFilters:
        dirExists: test/e2e

    coverage:
      steps:
        - coverage:clean
        - coverage:generate
        - coverage:generate-flutter
        - coverage:combine
        - coverage:report

    coverage:clean:
      run: rm -rf coverage
      exec:
        dirExists: coverage

    coverage:generate:
      description: Test all packages with coverage
      run: |
        dart pub global run coverage:test_with_coverage &&
        lcov --ignore-errors empty --summary coverage/lcov.info
      exec:
        concurrency: 4
      packageFilters:
        flutter: false
        dirExists: test

    coverage:generate-flutter:
      description: Test all packages with coverage
      run: |
        flutter test --coverage
      exec:
        concurrency: 4
      packageFilters:
        flutter: true
        dirExists: test

    coverage:combine:
      description: Combine coverage across packages
      steps:
        - rm -rf $MELOS_ROOT_PATH/site/coverage
        - mkdir $MELOS_ROOT_PATH/site/coverage
        - coverage:aggregate
        - lcov --summary site/coverage/lcov.info

    coverage:aggregate:
      description: Combine the package coverage files
      run: $MELOS_ROOT_PATH/scripts/combine_coverage.sh
      exec:
        fileExists: coverage/lcov.info
        concurrency: 1
      packageFilters:
        dirExists: test

    coverage:report:
      run: |
        genhtml $MELOS_ROOT_PATH/site/coverage/lcov.info \
          -o=$MELOS_ROOT_PATH/site/coverage/html

    licenses:add:
      run: |
        cat addlicense_config.txt | xargs addlicense
      description: Add the license header in all necessary files.

    licenses:
      run: |
        cat addlicense_config.txt | xargs addlicense --check
      description: Check the license header in all necessary files.

    doc:
      exec: dart doc -o MELOS_ROOT_PATH/site/api-docs/MELOS_PACKAGE_NAME/api
      packageFilters:
        flutter: false

    pubspec_checker:
      exec: dart run pubspec_checker all -s -l

    clean_packages:
      exec: |
        rm -rf site
        rm -rf coverage
        rm -rf doc
