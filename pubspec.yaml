name: kmdb_workspace
publish_to: none
version: 0.1.0-dev.1

repository: https://github.com/bettongia/kmdb
issue_tracker: https://github.com/bettongia/kmdb/issues

environment:
  sdk: ^3.12.0

workspace:
  - packages/kmdb
  - packages/kmdb_cli
  - packages/kmdb_harness
  - packages/kmdb_google_drive
  - packages/kmdb_extractor_pdf
  # kmdb_icloud and kmdb_icloud/example are Flutter plugins and are NOT part of
  # the Dart workspace.  They depend on `flutter: sdk: flutter`, which requires
  # the Flutter SDK — something Dart-only CI runners (Linux, Windows) do not
  # have.  Those packages manage their own dependency resolution (path deps on
  # kmdb/kmdb_harness) and are bootstrapped separately when Flutter is available
  # (e.g. the macOS CI job, or local development with Flutter installed).

dev_dependencies:
  lints: ^6.0.0
  melos: ^7.5.0
  test: ^1.25.6
  pubspec_checker: ^1.3.0

dependency_overrides:
  meta: ^1.18.2
  uuid: ^4.5.3
  cbor: ^6.5.1
  web: ^1.1.0
  betto_common: ^0.1.0-dev.1
  betto_schema: ^0.1.0-dev.1
  betto_zstd: ^0.1.0-dev.3
  betto_mediatype_detector: ^0.1.0-dev.1
  betto_lexical: ^0.1.0-dev.1
  betto_inferencing: ^0.1.0-dev.1
  betto_charset_detector: ^0.1.0-dev.2
  charset: ^2.0.1
  betto_pdfium: ^0.1.0-dev.3

melos:
  # Disable generation of IntelliJ/Android Studio run configurations. Melos's
  # `cleanIntelliJ` deletes these while iterating a live directory listing and
  # only retries on Windows, so on macOS/Linux it intermittently crashes with a
  # PathNotFoundException during `melos clean`. We don't rely on the generated
  # run configs, so turning generation off removes the failure at its source.
  ide:
    intellij:
      enabled: false

  scripts:
    analyze:
      description: Analyze all packages
      exec: dart analyze

    format:
      description: Format dart code
      exec: dart format lib test

    benchmarks:
      description: Run all benchmarks
      stdio: inherit
      run: |
        cd packages/kmdb
        dart run benchmark/main.dart

    test:
      description: Test all packages
      exec: dart test
      packageFilters:
        dirExists: test

    test_dart:
      description: Test all pure Dart packages
      run: dart test
      exec:
        concurrency: 2
      packageFilters:
        dirExists: test
        flutter: false

    pre_commit_test:
      description: Test packages prior to commit
      exec: dart test
      packageFilters:
        dirExists: test
        scope:
          - kmdb

    e2e-test:
      description: Run the e2e tests
      exec: dart test --preset e2e
      packageFilters:
        dirExists: test/e2e

    coverage:
      steps:
        - coverage:clean
        - coverage:generate
        - coverage:combine
        - coverage:report

    coverage:clean:
      run: rm -rf coverage
      exec:
        dirExists: coverage

    coverage:generate:
      description: Test all packages with coverage
      run: |
        dart run coverage:test_with_coverage &&
        lcov --ignore-errors empty --summary coverage/lcov.info
      exec:
        concurrency: 2
      packageFilters:
        dirExists: test

    coverage:combine:
      description: Combine coverage across packages
      steps:
        - rm -rf $MELOS_ROOT_PATH/site/coverage
        - mkdir -p $MELOS_ROOT_PATH/site/coverage
        - coverage:aggregate
        - lcov --summary site/coverage/lcov.info

    coverage:aggregate:
      description: Combine the package coverage files
      run: $MELOS_ROOT_PATH/scripts/combine_coverage.sh
      exec:
        fileExists: coverage/lcov.info
        concurrency: 1
      packageFilters:
        dirExists: test

    coverage:report:
      run: |
        genhtml $MELOS_ROOT_PATH/site/coverage/lcov.info \
          -o=$MELOS_ROOT_PATH/site/coverage

    licenses:add:
      run: |
        cat addlicense_config.txt | xargs addlicense
      description: Add the license header in all necessary files.

    licenses:
      run: |
        cat addlicense_config.txt | xargs addlicense --check
      description: Check the license header in all necessary files.

    doc:
      exec: dart doc -o MELOS_ROOT_PATH/site/api-docs/MELOS_PACKAGE_NAME/api

    pubspec_checker:
      exec: dart run pubspec_checker all -s -l

    clean_packages:
      exec: |
        rm -rf site
        rm -rf coverage
        rm -rf doc

    scrub_packages:
      exec: |
        rm -rf site
        rm -rf coverage
        rm -rf doc
        rm -rf .dart_tool
