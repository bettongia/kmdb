name: kmdb_workspace
publish_to: none

environment:
  sdk: ^3.12.0

workspace:
  - packages/kmdb
  - packages/kmdb_cli
  - packages/kmdb_harness
  - packages/kmdb_tokenizer_icu
  - packages/kmdb_inferencing
  - packages/kmdb_lexical
  - packages/kmdb_google_drive
  - packages/kmdb_icloud

dev_dependencies:
  lints: ^6.0.0
  melos: ^7.5.0
  test: ^1.25.6
  pubspec_checker: ^1.3.0

dependency_overrides:
  meta: ^1.18.2
  xml: ^7.0.0
  uuid: ^4.5.3
  cbor: ^6.5.1
  web: ^1.1.0
  ffi: ^2.2.0
  archive: ^4.0.0
  intl: ^0.20.2
  betto_common:
    git: git@github.com:bettongia/common.git
  betto_schema:
    git: git@github.com:bettongia/schema.git
  betto_zstd:
    git: git@github.com:bettongia/zstd.git
  betto_registry:
    git: git@github.com:bettongia/registry.git
  betto_builder_tools:
    git: git@github.com:bettongia/builder_tools.git

melos:
  # Disable generation of IntelliJ/Android Studio run configurations. Melos's
  # `cleanIntelliJ` deletes these while iterating a live directory listing and
  # only retries on Windows, so on macOS/Linux it intermittently crashes with a
  # PathNotFoundException during `melos clean`. We don't rely on the generated
  # run configs, so turning generation off removes the failure at its source.
  ide:
    intellij:
      enabled: false

  scripts:
    analyze:
      description: Analyze all packages
      exec: dart analyze

    format:
      description: Format dart code
      exec: dart format lib test

    benchmarks:
      description: Run all benchmarks
      exec: dart run benchmark/main.dart
      packageFilters:
        dirExists: benchmark

    test:
      description: Test all packages
      exec: dart test
      packageFilters:
        dirExists: test

    pre_commit_test:
      description: Test packages prior to commit
      exec: dart test
      packageFilters:
        dirExists: test
        scope:
          - kmdb

    e2e-test:
      description: Run the e2e tests
      exec: dart test --preset e2e
      packageFilters:
        dirExists: test/e2e

    coverage:
      steps:
        - coverage:clean
        - coverage:generate
        - coverage:combine
        - coverage:report

    coverage:clean:
      run: rm -rf coverage
      exec:
        dirExists: coverage

    coverage:generate:
      description: Test all packages with coverage
      run: |
        dart run coverage:test_with_coverage &&
        lcov --ignore-errors empty --summary coverage/lcov.info
      exec:
        concurrency: 2
      packageFilters:
        dirExists: test

    coverage:combine:
      description: Combine coverage across packages
      steps:
        - rm -rf $MELOS_ROOT_PATH/site/coverage
        - mkdir $MELOS_ROOT_PATH/site/coverage
        - coverage:aggregate
        - lcov --summary site/coverage/lcov.info

    coverage:aggregate:
      description: Combine the package coverage files
      run: $MELOS_ROOT_PATH/scripts/combine_coverage.sh
      exec:
        fileExists: coverage/lcov.info
        concurrency: 1
      packageFilters:
        dirExists: test

    coverage:report:
      run: |
        genhtml $MELOS_ROOT_PATH/site/coverage/lcov.info \
          -o=$MELOS_ROOT_PATH/site/coverage/html

    licenses:add:
      run: |
        cat addlicense_config.txt | xargs addlicense
      description: Add the license header in all necessary files.

    licenses:
      run: |
        cat addlicense_config.txt | xargs addlicense --check
      description: Check the license header in all necessary files.

    doc:
      exec: dart doc -o MELOS_ROOT_PATH/site/api-docs/MELOS_PACKAGE_NAME/api

    pubspec_checker:
      exec: dart run pubspec_checker all -s -l

    clean_packages:
      exec: |
        rm -rf site
        rm -rf coverage
        rm -rf doc

    scrub_packages:
      exec: |
        rm -rf site
        rm -rf coverage
        rm -rf doc
        rm -rf .dart_tool
