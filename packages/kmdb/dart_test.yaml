tags:
  e2e:
    skip:
      "E2E tests are skipped by default. Use `dart test --preset e2e` to run
      them."
    timeout: 10m
presets:
  e2e:
    exclude_tags: "any"
    include_tags: "e2e"
    tags:
      e2e:
        skip: false

# Pass --no-sandbox to Chrome when running web tests in CI Linux environments
# where the sandbox is not available (e.g. running as root in a container).
# Mirrors the configuration used by bettongia/zstd's own web test lane.
override_platforms:
  chrome:
    settings:
      arguments: --no-sandbox
