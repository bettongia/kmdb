name: kmdb
description:
  A local-first document database for Dart/Flutter with multi-device sync.
version: 0.1.0-dev.1
repository: https://github.com/bettongia/kmdb

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  cbor: ^6.5.1
  betto_schema: ^0.1.0-dev.2
  betto_zstd: ^0.1.0-dev.3
  betto_mediatype_detector: ^0.1.0-dev.1
  betto_common: ^0.1.0-dev.2
  meta: ^1.18.3
  betto_lexical: ^0.1.0-dev.2
  betto_inferencing: ^0.1.0-dev.3
  betto_charset_detector: ^0.1.0-dev.2
  betto_lang_detector: ^0.1.0-dev.1
  charset: ^2.0.1
  uuid: ^4.5.3
  web: ^1.1.0
  intl: ^0.20.2

  # AES-256-GCM encryption, Argon2id KDF, HKDF (pure-Dart; no Flutter dependency).
  # cryptography_flutter (native acceleration) lives in the separate kmdb_flutter
  # add-on package — do NOT add it here.
  cryptography: ^2.9.0

  # Unicode nromalization
  unorm_dart: ^0.3.2
  # test is a regular (not dev) dependency because lib/test_support.dart is a
  # public test-support library that downstream packages import in their own
  # test trees. Keeping it here ensures the package:test API resolves for those
  # consumers without requiring them to add their own explicit dependency.
  test: ^1.30.0

dev_dependencies:
  build_runner: ^2.13.1
  lints: ^6.1.0
  mockito: ^5.6.4
