include: package:lints/recommended.yaml

linter:
  rules:
    # prefer_initializing_formals requires the constructor parameter name to
    # match the field name.  Our constructor uses named parameters (`syncRoot`,
    # `retryConfig`) whose public names differ from the private field names
    # (`_syncRoot`, `_retryConfig`).  Dart does not allow `this._x` in
    # constructor signatures, so the lint cannot be satisfied here.
    prefer_initializing_formals: false
