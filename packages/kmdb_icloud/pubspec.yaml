name: kmdb_icloud
description: Apple iCloud (CloudKit) sync adapter for KMDB — connects the
  SyncStorageAdapter interface to the CloudKit framework via a Flutter
  MethodChannel plugin (iOS and macOS only).
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: ">=3.29.0"

# Not a workspace member — this package is a Flutter plugin and cannot be part
# of the Dart-only workspace (flutter: sdk: flutter breaks Dart-only bootstrap).
# Dependencies on workspace packages are expressed as path references so that
# local development and macOS CI work correctly when Flutter is available.

dependencies:
  flutter:
    sdk: flutter
  kmdb:
    path: ../kmdb

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  kmdb_harness:
    path: ../kmdb_harness

# Mirror the workspace-level overrides so transitive betto_* deps resolve to
# the same versions used by the rest of the repo.  Keep in sync with the root
# pubspec.yaml dependency_overrides block.
dependency_overrides:
  kmdb:
    path: ../kmdb
  meta: ^1.18.2
  uuid: ^4.5.3
  cbor: ^6.5.1
  web: ^1.1.0
  betto_common: ^0.1.0-dev.1
  betto_schema: ^0.1.0-dev.1
  betto_zstd: ^0.1.0-dev.3
  betto_mediatype_detector: ^0.1.0-dev.1
  betto_lexical: ^0.1.0-dev.1
  betto_inferencing: ^0.1.0-dev.1

flutter:
  plugin:
    platforms:
      ios:
        classPrefix: Kmdb
        pluginClass: KmdbIcloudPlugin
      macos:
        classPrefix: Kmdb
        pluginClass: KmdbIcloudPlugin
